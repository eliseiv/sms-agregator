# =============================================================================
# novirell.shop — edge vhost для sms-agreagtor.
#
# ВАЖНО: этот сервис НЕ поднимает собственный edge на 80/443. Хостовые 80/443
# принадлежат контейнеру mail-agregator (mas-nginx, nginx:1.27-alpine). Данный
# vhost ДОБАВЛЯЕТСЯ (additive-only) в тот же mas-nginx рядом с postapp.store —
# postapp.store не изменяется и продолжает работать.
#
# Установка (idempotent) — deploy/bootstrap.sh (первичная) и deploy/deploy.sh:
#   1) PRIMARY (envsubst-free): docker cp в mas-nginx:/etc/nginx/conf.d/novirell.shop.conf.
#      Грузится через `include /etc/nginx/conf.d/*.conf` из их nginx.conf; их
#      envsubst к нему НЕ применяется. Применяется немедленно (nginx -s reload).
#   2) DURABILITY: копия в /opt/mail-agregator/deploy/nginx/templates/novirell.shop.conf.template
#      (alpine-entrypoint регенерирует conf.d из templates при рестарте/пересоздании
#       mas-nginx, поэтому vhost переживает передеплой mail-agregator).
#   3) docker exec mas-nginx nginx -t && nginx -s reload.
#
# ENVSUBST-SAFE (подтверждено инспекцией сервера): entrypoint mas-nginx
# (20-envsubst-on-templates.sh, сток nginx:alpine) вызывает envsubst с ЯВНЫМ
# allowlist `defined_envs` = ${VAR} по всем env контейнера (фактически:
# SERVER_DOMAIN, NGINX_VERSION, NJS_*, DYNPKG_RELEASE, PKG_RELEASE, PATH).
# Наши nginx-переменные ($host/$uri/$request_uri/$remote_addr/
# $proxy_add_x_forwarded_for/$sms_upstream) в allowlist НЕ входят и остаются
# нетронутыми (тот же приём, что в их default.conf.template с bare $host/$uri).
# Self-heal: после их `git clean -fdx` (снёс бы untracked template) повторный
# запуск sms-деплоя восстановит и conf.d, и template (idempotent).
#
# TLS: сертификат novirell.shop выпускается ХОСТОВЫМ certbot тем же механизмом,
# что и postapp.store — webroot /var/www/certbot; /etc/letsencrypt bind-mount RO
# в mas-nginx. ACME http-01 challenge отдаёт секция listen 80 ниже.
#
# Upstream: sms-agreagtor app доступен по docker-DNS имени контейнера
# `sms-aggregator-app:8000` в внешней сети mas-net (app подключён к ней в
# docker-compose.prod.yml). Порт 8137 на хосте публикуется только на 127.0.0.1
# (для локального healthcheck), наружу app НЕ выставлен.
#
# Файл содержит ТОЛЬКО nginx runtime-переменные ($host, $uri, $remote_addr,
# $proxy_add_x_forwarded_for, $sms_upstream) — они не совпадают ни с одной
# env-переменной mail-agregator, поэтому envsubst alpine-entrypoint их не тронет
# (тот же приём, что в default.conf.template mail-agregator).
# =============================================================================

# ---- HTTP (80): ACME-challenge + редирект на HTTPS --------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name novirell.shop;

    # Локальный liveness (не для публики).
    location = /_health_nginx_sms {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Let's Encrypt http-01 — общий хостовый webroot (RO-mount в mas-nginx).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS (443): reverse-proxy на sms app ----------------------------------
server {
    listen              443 ssl;
    listen              [::]:443 ssl;
    http2               on;
    server_name         novirell.shop;

    # Сертификат управляется хостовым certbot; mas-nginx монтирует
    # /etc/letsencrypt RO. /live/<domain>/ — симлинк на актуальный архив.
    ssl_certificate         /etc/letsencrypt/live/novirell.shop/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/novirell.shop/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/novirell.shop/chain.pem;

    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # HSTS (nginx владеет TLS). CSP/X-Frame-Options/X-Content-Type-Options
    # ставит само приложение (SecurityHeaders-middleware, docs/08 §7) — здесь
    # не дублируем, чтобы не расходиться.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 5m;
    client_body_timeout  30s;

    # ACME и по HTTPS (безвредно).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Динамический ре-резолвинг upstream: имя резолвится per-request через
    # встроенный docker-DNS (127.0.0.11), поэтому пересоздание контейнера
    # sms-aggregator-app (новый IP) не вызывает залипания 502.
    set $sms_upstream http://sms-aggregator-app:8000;

    location / {
        resolver             127.0.0.11 valid=10s ipv6=off;
        resolver_timeout     2s;

        proxy_pass               $sms_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
    }
}
